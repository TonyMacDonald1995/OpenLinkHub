{{ define "xeneon-cpu-load" }}
{{ $root := . }}
<div class="card system-card thermal-widget" id="xeneon-cpu-load" data-value="0" data-max="100" data-color="#38bdf8">
    <div class="card-body">
        <div class="thermal-meta">
            <div class="big-label">CPU Usage</div>
        </div>
        <div class="ring-chart">
            <svg viewBox="0 0 120 120" aria-hidden="true">
                <circle class="ring-track" cx="60" cy="60" r="46"></circle>
                <circle class="ring-progress" cx="60" cy="60" r="46"></circle>
            </svg>
            <div class="center">
                <div class="small">
                    <div class="thermal-temp chart-load">0</div>
                </div>
                <div class="medium">%</div>
            </div>
        </div>
    </div>
</div>
{{ end }}
